<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo | Andares Corporativo</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            dark: '#0a0a0a',
                            light: '#f5f5f5',
                            gold: '#C5A880', 
                            green: '#1E3F20' 
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background-color: #f5f5f5; }
        .hero-pattern {
            background-color: #0a0a0a;
            background-image: radial-gradient(rgba(197, 168, 128, 0.15) 1px, transparent 1px);
            background-size: 30px 30px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // BASE DE DATOS DEL CATÁLOGO
        const TERRENOS = [
            { 
                id: 1, 
                nombre: "Lotes Campestres Monte Alto", 
                ubicacion: "Entorno Natural, Rodeado De Zona Protegida", 
                area: "300", 
                precio: "Avalúo $2,400/m²", 
                enganche: "Enganche 30% | Hasta 24 MSI",
                status: "Disponible",
                imagen: "./portada-monte-alto.jpg", 
                linkDestino: "https://monte-alto.vercel.app/", 
                isReady: true 
            },
            { id: 2, nombre: "Residencial Fase 2 (Próximamente)", ubicacion: "San Isidro, Sur", area: "250", precio: "Por Definir", enganche: "Espéralo pronto", status: "Próximamente", isReady: false },
            { id: 3, nombre: "Lote Esquina Premium", ubicacion: "Centro, San Isidro", area: "310", precio: "Por Definir", enganche: "Espéralo pronto", status: "Próximamente", isReady: false },
            { id: 4, nombre: "Terreno Vista Panorámica", ubicacion: "San Isidro, Zona Alta", area: "500", precio: "Por Definir", enganche: "Espéralo pronto", status: "Próximamente", isReady: false },
            { id: 5, nombre: "Lote Comercial Avenida", ubicacion: "Avenida Principal", area: "600", precio: "Por Definir", enganche: "Espéralo pronto", status: "Próximamente", isReady: false },
            { id: 6, nombre: "Terreno Familiar Fase 1", ubicacion: "Residencial Fase 1", area: "200", precio: "Por Definir", enganche: "Espéralo pronto", status: "Próximamente", isReady: false },
            { id: 7, nombre: "Terreno Privado VIP", ubicacion: "Residencial Fase 2", area: "450", precio: "Por Definir", enganche: "Espéralo pronto", status: "Próximamente", isReady: false }
        ];

        function App() {
            const [selectedLote, setSelectedLote] = useState(null);

            const handleWhatsAppGeneral = () => {
                const mensaje = "Hola Andares Corporativo, me gustaría recibir asesoría sobre su catálogo de terrenos disponibles.";
                window.open(`https://wa.me/5212283146884?text=${encodeURIComponent(mensaje)}`, '_blank');
            };

            const handleVerDetalles = (terreno) => {
                if (terreno.isReady && terreno.linkDestino) {
                    window.open(terreno.linkDestino, '_blank');
                } else {
                    setSelectedLote(terreno);
                }
            };

            return (
                <div className="min-h-screen flex flex-col">
                    
                    {/* BARRA DE NAVEGACIÓN DARK */}
                    <nav className="bg-brand-dark border-b border-white/10 sticky top-0 z-40">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-20 flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 border border-brand-gold text-brand-gold flex items-center justify-center rounded-sm font-serif font-black text-xl">
                                    A
                                </div>
                                <div className="flex flex-col">
                                    <span className="font-bold text-lg tracking-widest text-white uppercase leading-none">Andares</span>
                                    <span className="text-[9px] text-brand-gold tracking-[0.3em] uppercase mt-1">Corporativo</span>
                                </div>
                            </div>
                            <button onClick={handleWhatsAppGeneral} className="bg-brand-gold text-brand-dark px-5 py-2.5 rounded-full text-xs sm:text-sm font-black uppercase tracking-wider hover:bg-white transition-colors flex items-center gap-2">
                                <i className="fa-brands fa-whatsapp text-lg"></i>
                                <span className="hidden sm:inline">Hablar con un Asesor</span>
                            </button>
                        </div>
                    </nav>

                    {/* HERO SECTION DARK PREMIUM */}
                    <header className="hero-pattern text-white py-24 sm:py-32 relative overflow-hidden">
                        <div className="absolute inset-0 bg-gradient-to-b from-transparent to-brand-dark/50"></div>
                        <div className="relative max-w-4xl mx-auto px-6 text-center z-10">
                            <p className="text-brand-gold font-bold tracking-[0.4em] uppercase text-xs md:text-sm mb-6">Confianza que construye</p>
                            <h1 className="text-4xl md:text-6xl font-black mb-6 tracking-tight leading-tight">
                                Invierte hoy en tu <span className="text-brand-gold italic">Patrimonio.</span>
                            </h1>
                            <p className="text-lg md:text-xl text-gray-400 max-w-2xl mx-auto font-light">
                                Descubre nuestro catálogo exclusivo de terrenos. Desarrollos con alta plusvalía, certeza legal y los mejores planes de financiamiento.
                            </p>
                        </div>
                    </header>

                    {/* SECCIÓN DEL CATÁLOGO */}
                    <main id="catalogo" className="flex-1 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-20 w-full -mt-10 relative z-20">
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
                            {TERRENOS.map((terreno) => (
                                <div key={terreno.id} className="bg-white rounded-[2rem] overflow-hidden shadow-2xl hover:shadow-brand-gold/20 transition-all duration-300 border border-gray-100 flex flex-col group transform hover:-translate-y-2">
                                    
                                    {/* ETIQUETA DE ESTADO */}
                                    <div className="absolute top-4 right-4 z-20">
                                        {terreno.isReady ? (
                                            <span className="bg-green-600 text-white px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest shadow-lg flex items-center gap-2">
                                                <div className="w-1.5 h-1.5 bg-white rounded-full animate-pulse"></div> Disponible
                                            </span>
                                        ) : (
                                            <span className="bg-brand-dark/80 backdrop-blur-md text-brand-gold px-4 py-1.5 rounded-full text-[10px] font-bold uppercase tracking-widest">
                                                Próximamente
                                            </span>
                                        )}
                                    </div>

                                    {/* IMAGEN DEL TERRENO (FORMATO PANORÁMICO CORRECTO) */}
                                    <div className="w-full aspect-video bg-[#111] relative overflow-hidden flex items-center justify-center">
                                        {terreno.isReady ? (
                                            <img 
                                                src={terreno.imagen} 
                                                alt={terreno.nombre} 
                                                className="w-full h-full object-contain transform group-hover:scale-105 transition-transform duration-700"
                                                onError={(e) => { e.target.src = 'https://images.unsplash.com/photo-1500382017468-9049fed747ef?q=80&w=1000&auto=format&fit=crop'; }}
                                            />
                                        ) : (
                                            <div className="w-full h-full flex flex-col items-center justify-center text-gray-600">
                                                <i className="fa-solid fa-map-location-dot text-5xl mb-3 opacity-20"></i>
                                            </div>
                                        )}
                                    </div>

                                    {/* INFORMACIÓN DE LA TARJETA */}
                                    <div className="p-8 flex-1 flex flex-col bg-white">
                                        <h3 className="text-2xl font-black text-brand-dark mb-2 leading-tight uppercase tracking-tighter">{terreno.nombre}</h3>
                                        <p className="text-gray-500 text-sm mb-6 flex items-start gap-2">
                                            <i className="fa-solid fa-location-dot mt-1 text-brand-gold"></i> {terreno.ubicacion}
                                        </p>
                                        
                                        <div className="grid grid-cols-2 gap-4 mb-6">
                                            <div className="bg-gray-50 p-4 rounded-xl border border-gray-100">
                                                <p className="text-[9px] text-gray-400 font-bold uppercase tracking-widest mb-1">Superficie</p>
                                                <p className="font-black text-brand-dark flex items-center gap-2">
                                                    <i className="fa-solid fa-vector-square text-brand-gold"></i> {terreno.area} m²
                                                </p>
                                            </div>
                                            <div className="bg-gray-50 p-4 rounded-xl border border-gray-100">
                                                <p className="text-[9px] text-gray-400 font-bold uppercase tracking-widest mb-1">Precio</p>
                                                <p className="font-black text-brand-dark">{terreno.precio}</p>
                                            </div>
                                        </div>

                                        <div className="bg-brand-dark text-white px-4 py-3 rounded-xl text-[10px] font-bold mb-8 flex items-center gap-3">
                                            <i className="fa-solid fa-shield-check text-brand-gold text-base"></i> {terreno.enganche}
                                        </div>

                                        <div className="mt-auto">
                                            <button 
                                                onClick={() => handleVerDetalles(terreno)} 
                                                className={`w-full py-4 rounded-xl text-xs font-black uppercase tracking-[0.1em] transition-all ${
                                                    terreno.isReady 
                                                    ? 'bg-brand-gold text-brand-dark hover:bg-brand-dark hover:text-white shadow-xl' 
                                                    : 'bg-gray-100 text-gray-400 cursor-not-allowed'
                                                }`}
                                            >
                                                {terreno.isReady ? 'Ver Proyecto Completo' : 'Próximamente'}
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </main>

                    {/* MODAL PARA TERRENOS EN PREPARACIÓN */}
                    {selectedLote && (
                        <div className="fixed inset-0 bg-black/90 backdrop-blur-sm z-50 flex items-center justify-center p-4 animate-in fade-in duration-300">
                            <div className="bg-white max-w-md w-full rounded-3xl p-8 relative animate-in zoom-in duration-300">
                                <button onClick={() => setSelectedLote(null)} className="absolute top-4 right-4 w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center text-gray-500 hover:bg-red-100 hover:text-red-500 transition-colors">
                                    <i className="fa-solid fa-xmark text-lg"></i>
                                </button>
                                
                                <div className="w-20 h-20 bg-brand-gold/10 rounded-full flex items-center justify-center mx-auto mb-6">
                                    <i className="fa-solid fa-person-digging text-4xl text-brand-gold"></i>
                                </div>
                                
                                <h3 className="text-2xl font-black text-center text-brand-dark mb-4 leading-tight uppercase">{selectedLote.nombre}</h3>
                                
                                <p className="text-gray-600 text-center mb-8 text-sm">
                                    Estamos afinando los últimos detalles comerciales y legales de este desarrollo. ¡Muy pronto habilitaremos su página oficial con toda la información!
                                </p>
                                
                                <button onClick={() => setSelectedLote(null)} className="w-full bg-brand-dark text-white py-4 rounded-xl font-bold uppercase tracking-widest text-xs hover:bg-brand-gold hover:text-brand-dark transition-colors">
                                    Entendido
                                </button>
                            </div>
                        </div>
                    )}

                    {/* FOOTER */}
                    <footer className="bg-brand-dark text-gray-400 py-16 text-center border-t border-white/10 mt-auto">
                        <div className="w-12 h-12 border border-brand-gold text-brand-gold flex items-center justify-center rounded-sm font-serif font-black text-2xl mx-auto mb-4">
                            A
                        </div>
                        <p className="font-bold text-white tracking-[0.3em] uppercase mb-1 text-sm">Andares Corporativo</p>
                        <p className="text-xs text-brand-gold font-light italic mb-8">"Confianza que construye"</p>
                        
                        <div className="flex justify-center gap-4 mb-10">
                            <a href="#" className="w-12 h-12 rounded-full bg-white/5 flex items-center justify-center hover:bg-brand-gold hover:text-brand-dark transition-all transform hover:scale-110"><i className="fa-brands fa-facebook-f"></i></a>
                            <a href="#" className="w-12 h-12 rounded-full bg-white/5 flex items-center justify-center hover:bg-brand-gold hover:text-brand-dark transition-all transform hover:scale-110"><i className="fa-brands fa-instagram"></i></a>
                            <a href="#" className="w-12 h-12 rounded-full bg-white/5 flex items-center justify-center hover:bg-brand-gold hover:text-brand-dark transition-all transform hover:scale-110"><i className="fa-brands fa-whatsapp"></i></a>
                        </div>
                        <p className="text-[9px] opacity-40 tracking-widest uppercase">&copy; 2026 ANDARES CORPORATIVO.</p>
                    </footer>

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
