<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo | Andares Corporativo</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            dark: '#111111',
                            light: '#f8f9fa',
                            gold: '#C5A880', // Dorado elegante
                            green: '#1E3F20' // Verde Monte Alto
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background-color: #f8f9fa; }
        .hero-pattern {
            background-color: #111;
            background-image: radial-gradient(rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 30px 30px;
        }
        /* El truco mágico para quitar el fondo blanco del logo JPG */
        .logo-blend {
            mix-blend-mode: multiply;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // BASE DE DATOS DEL CATÁLOGO
        const TERRENOS = [
            { 
                id: 1, 
                nombre: "Lotes Campestres Monte Alto", 
                ubicacion: "Entorno Natural, Zona Protegida", 
                area: "300", 
                precio: "Avalúo $2,400/m²", 
                enganche: "Enganche 30% | Hasta 24 MSI",
                status: "Disponible",
                imagen: "./portada-monte-alto.jpg", // La imagen que subirás a GitHub
                linkDestino: "https://monte-alto.vercel.app/", // Link real
                isReady: true 
            },
            { id: 2, nombre: "Residencial Fase 2 (Próximamente)", ubicacion: "San Isidro, Sur", area: "250", precio: "Por Definir", enganche: "Espéralo pronto", status: "Próximamente", isReady: false },
            { id: 3, nombre: "Lote Esquina Premium", ubicacion: "Centro, San Isidro", area: "310", precio: "Por Definir", enganche: "Espéralo pronto", status: "Próximamente", isReady: false },
            { id: 4, nombre: "Terreno Vista Panorámica", ubicacion: "San Isidro, Zona Alta", area: "500", precio: "Por Definir", enganche: "Espéralo pronto", status: "Próximamente", isReady: false },
            { id: 5, nombre: "Lote Comercial Avenida", ubicacion: "Avenida Principal", area: "600", precio: "Por Definir", enganche: "Espéralo pronto", status: "Próximamente", isReady: false },
            { id: 6, nombre: "Terreno Familiar Fase 1", ubicacion: "Residencial Fase 1", area: "200", precio: "Por Definir", enganche: "Espéralo pronto", status: "Próximamente", isReady: false },
            { id: 7, nombre: "Terreno Privado VIP", ubicacion: "Residencial Fase 2", area: "450", precio: "Por Definir", enganche: "Espéralo pronto", status: "Próximamente", isReady: false }
        ];

        function App() {
            const [selectedLote, setSelectedLote] = useState(null);

            const handleWhatsAppGeneral = () => {
                const mensaje = "Hola Andares Corporativo, me gustaría recibir asesoría sobre su catálogo de terrenos disponibles.";
                window.open(`https://wa.me/5212283146884?text=${encodeURIComponent(mensaje)}`, '_blank');
            };

            const handleVerDetalles = (terreno) => {
                if (terreno.isReady && terreno.linkDestino) {
                    // Si ya está listo (como Monte Alto), abre su página web
                    window.open(terreno.linkDestino, '_blank');
                } else {
                    // Si no está listo, muestra el aviso
                    setSelectedLote(terreno);
                }
            };

            return (
                <div className="min-h-screen flex flex-col">
                    
                    {/* BARRA DE NAVEGACIÓN (Fondo blanco para que el logo se mezcle perfecto) */}
                    <nav className="bg-white shadow-md sticky top-0 z-40">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-24 flex items-center justify-between">
                            
                            {/* LOGO ANDARES CORPORATIVO */}
                            <div className="flex items-center h-full py-2">
                                <img 
                                    src="./logo.jpg" 
                                    alt="Andares Corporativo" 
                                    className="h-full object-contain logo-blend"
                                    onError={(e) => {
                                        // Si la imagen falla (aún no la subes), muestra este texto de respaldo
                                        e.target.style.display = 'none';
                                        e.target.nextSibling.style.display = 'flex';
                                    }}
                                />
                                {/* Texto de respaldo por si la imagen no carga */}
                                <div style={{display: 'none'}} className="items-center gap-2">
                                    <span className="font-serif italic text-3xl font-black text-brand-dark">Andares</span>
                                    <span className="text-[10px] font-bold tracking-[0.2em] mt-2">CORPORATIVO</span>
                                </div>
                            </div>

                            <button onClick={handleWhatsAppGeneral} className="bg-brand-dark text-white px-6 py-3 rounded-full text-sm font-bold hover:bg-brand-gold transition-colors flex items-center gap-2 shadow-lg hover:shadow-brand-gold/50">
                                <i className="fa-brands fa-whatsapp text-green-400 text-lg"></i>
                                <span className="hidden sm:inline">Hablar con un Asesor</span>
                            </button>
                        </div>
                    </nav>

                    {/* HERO SECTION */}
                    <header className="hero-pattern text-white py-24 sm:py-32 relative overflow-hidden">
                        <div className="absolute inset-0 bg-gradient-to-b from-transparent to-brand-dark opacity-90"></div>
                        <div className="relative max-w-4xl mx-auto px-6 text-center z-10">
                            <p className="text-brand-gold font-bold tracking-[0.3em] uppercase text-sm mb-4">Confianza que construye</p>
                            <h1 className="text-4xl sm:text-6xl font-black mb-6 tracking-tight leading-tight">
                                Invierte inteligentemente en tu <span className="text-brand-gold italic">Patrimonio.</span>
                            </h1>
                            <p className="text-lg sm:text-xl text-gray-300 mb-10 max-w-2xl mx-auto font-light">
                                Descubre nuestro catálogo de terrenos residenciales y campestres. Desarrollos con alta plusvalía, certeza legal y los mejores planes de financiamiento.
                            </p>
                        </div>
                    </header>

                    {/* SECCIÓN DEL CATÁLOGO */}
                    <main id="catalogo" className="flex-1 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-20">
                        
                        {/* CUADRÍCULA DE LOS 7 TERRENOS */}
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                            {TERRENOS.map((terreno) => (
                                <div key={terreno.id} className="bg-white rounded-3xl overflow-hidden shadow-lg hover:shadow-2xl transition-all duration-300 border border-gray-100 flex flex-col group relative transform hover:-translate-y-1">
                                    
                                    {/* Etiqueta de Estado */}
                                    <div className="absolute top-4 right-4 z-20">
                                        {terreno.isReady ? (
                                            <span className="bg-green-500 text-white px-4 py-1.5 rounded-full text-xs font-black uppercase tracking-widest shadow-md flex items-center gap-2">
                                                <div className="w-1.5 h-1.5 bg-white rounded-full animate-pulse"></div> Disponible
                                            </span>
                                        ) : (
                                            <span className="bg-gray-800/80 backdrop-blur-sm text-white px-4 py-1.5 rounded-full text-xs font-bold uppercase tracking-widest">
                                                Próximamente
                                            </span>
                                        )}
                                    </div>

                                    {/* Imagen del Terreno */}
                                    <div className="h-64 bg-gray-100 relative overflow-hidden flex items-center justify-center">
                                        {terreno.isReady ? (
                                            <img 
                                                src={terreno.imagen} 
                                                alt={terreno.nombre} 
                                                className="w-full h-full object-cover transform group-hover:scale-110 transition-transform duration-700"
                                                onError={(e) => { e.target.src = 'https://images.unsplash.com/photo-1500382017468-9049fed747ef?q=80&w=1000&auto=format&fit=crop'; }}
                                            />
                                        ) : (
                                            <div className="w-full h-full bg-brand-dark/5 flex flex-col items-center justify-center text-gray-400">
                                                <i className="fa-solid fa-map-location-dot text-6xl mb-4 opacity-50"></i>
                                                <p className="text-xs uppercase tracking-widest font-bold opacity-50">Preparando Terreno</p>
                                            </div>
                                        )}
                                        <div className="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>
                                    </div>

                                    {/* Información de la Tarjeta */}
                                    <div className="p-8 flex-1 flex flex-col relative bg-white">
                                        {/* Título y Ubicación */}
                                        <h3 className="text-2xl font-black text-brand-dark mb-2 leading-tight">{terreno.nombre}</h3>
                                        <p className="text-gray-500 text-sm mb-6 flex items-start gap-2">
                                            <i className="fa-solid fa-location-dot mt-1 text-brand-gold"></i> {terreno.ubicacion}
                                        </p>
                                        
                                        {/* Detalles Técnicos */}
                                        <div className="grid grid-cols-2 gap-4 mb-6">
                                            <div className="bg-gray-50 p-3 rounded-xl border border-gray-100">
                                                <p className="text-[10px] text-gray-400 font-bold uppercase tracking-widest mb-1">Superficie</p>
                                                <p className="font-black text-brand-dark flex items-center gap-2">
                                                    <i className="fa-solid fa-vector-square text-brand-gold"></i> {terreno.area} m²
                                                </p>
                                            </div>
                                            <div className="bg-gray-50 p-3 rounded-xl border border-gray-100">
                                                <p className="text-[10px] text-gray-400 font-bold uppercase tracking-widest mb-1">Precio Base</p>
                                                <p className="font-black text-brand-dark">{terreno.precio}</p>
                                            </div>
                                        </div>

                                        <div className="bg-brand-gold/10 text-brand-dark px-4 py-3 rounded-xl text-xs font-bold mb-8 border border-brand-gold/20 flex items-center gap-2">
                                            <i className="fa-solid fa-hand-holding-dollar text-brand-gold"></i> {terreno.enganche}
                                        </div>

                                        {/* Botón de Acción */}
                                        <div className="mt-auto">
                                            <button 
                                                onClick={() => handleVerDetalles(terreno)} 
                                                className={`w-full py-4 rounded-xl text-sm font-black uppercase tracking-widest transition-all ${
                                                    terreno.isReady 
                                                    ? 'bg-brand-dark text-white hover:bg-brand-gold shadow-lg hover:shadow-brand-gold/30' 
                                                    : 'bg-gray-100 text-gray-400 hover:bg-gray-200'
                                                }`}
                                            >
                                                {terreno.isReady ? 'Ver Proyecto Completo' : 'Próximamente'}
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </main>

                    {/* MODAL SIMULADO PARA TERRENOS NO LISTOS */}
                    {selectedLote && (
                        <div className="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-4 animate-in fade-in duration-300">
                            <div className="bg-white max-w-md w-full rounded-3xl p-8 relative animate-in zoom-in duration-300">
                                <button onClick={() => setSelectedLote(null)} className="absolute top-4 right-4 w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center text-gray-500 hover:bg-red-100 hover:text-red-500 transition-colors">
                                    <i className="fa-solid fa-xmark text-lg"></i>
                                </button>
                                
                                <div className="w-20 h-20 bg-brand-gold/10 rounded-full flex items-center justify-center mx-auto mb-6">
                                    <i className="fa-solid fa-person-digging text-4xl text-brand-gold"></i>
                                </div>
                                
                                <h3 className="text-2xl font-black text-center text-brand-dark mb-4 leading-tight uppercase">{selectedLote.nombre}</h3>
                                
                                <p className="text-gray-600 text-center mb-8 text-sm">
                                    Estamos afinando los últimos detalles comerciales y legales de este desarrollo. ¡Muy pronto habilitaremos su página oficial con toda la información!
                                </p>
                                
                                <button onClick={() => setSelectedLote(null)} className="w-full bg-brand-dark text-white py-4 rounded-xl font-bold uppercase tracking-widest text-xs hover:bg-black transition-colors">
                                    Entendido
                                </button>
                            </div>
                        </div>
                    )}

                    {/* FOOTER */}
                    <footer className="bg-brand-dark text-gray-400 py-16 text-center border-t border-gray-800">
                        <p className="font-serif italic text-3xl font-black text-white mb-2">Andares</p>
                        <p className="font-bold text-brand-gold tracking-[0.3em] uppercase mb-6 text-xs">Corporativo</p>
                        <p className="text-sm mb-8 font-light">"Confianza que construye"</p>
                        
                        <div className="flex justify-center gap-4 mb-10">
                            <a href="#" className="w-12 h-12 rounded-full bg-gray-800 flex items-center justify-center hover:bg-brand-gold hover:text-brand-dark transition-all transform hover:scale-110"><i className="fa-brands fa-facebook-f"></i></a>
                            <a href="#" className="w-12 h-12 rounded-full bg-gray-800 flex items-center justify-center hover:bg-brand-gold hover:text-brand-dark transition-all transform hover:scale-110"><i className="fa-brands fa-instagram"></i></a>
                            <a href="#" className="w-12 h-12 rounded-full bg-gray-800 flex items-center justify-center hover:bg-brand-gold hover:text-brand-dark transition-all transform hover:scale-110"><i className="fa-brands fa-whatsapp"></i></a>
                        </div>
                        <p className="text-xs opacity-50 tracking-widest">&copy; 2026 ANDARES CORPORATIVO.</p>
                    </footer>

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
