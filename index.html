<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo | Andares Corporativo</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            dark: '#111111',
                            light: '#f8f9fa',
                            gold: '#C5A880', 
                            green: '#1E3F20' 
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background-color: #f8f9fa; }
        /* Truco para quitar el fondo blanco del logo JPG */
        .logo-blend {
            mix-blend-mode: multiply;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // BASE DE DATOS DEL CATÁLOGO
        const TERRENOS = [
            { 
                id: 1, 
                nombre: "Lotes Campestres Monte Alto", 
                ubicacion: "Rodeado de Zona Protegida", // ¡AQUÍ ESTÁ EL CAMBIO CHINGÓN!
                area: "300", 
                precio: "Avalúo $2,400/m²", 
                enganche: "Enganche 30% | Hasta 24 MSI",
                status: "Disponible",
                imagen: "./portada-monte-alto.jpg", 
                linkDestino: "https://monte-alto.vercel.app/", 
                isReady: true 
            },
            { id: 2, nombre: "Residencial Fase 2 (Próximamente)", ubicacion: "San Isidro, Sur", area: "250", precio: "Por Definir", enganche: "Espéralo pronto", status: "Próximamente", isReady: false },
            { id: 3, nombre: "Lote Esquina Premium", ubicacion: "Centro, San Isidro", area: "310", precio: "Por Definir", enganche: "Espéralo pronto", status: "Próximamente", isReady: false },
            { id: 4, nombre: "Terreno Vista Panorámica", ubicacion: "San Isidro, Zona Alta", area: "500", precio: "Por Definir", enganche: "Espéralo pronto", status: "Próximamente", isReady: false },
            { id: 5, nombre: "Lote Comercial Avenida", ubicacion: "Avenida Principal", area: "600", precio: "Por Definir", enganche: "Espéralo pronto", status: "Próximamente", isReady: false },
            { id: 6, nombre: "Terreno Familiar Fase 1", ubicacion: "Residencial Fase 1", area: "200", precio: "Por Definir", enganche: "Espéralo pronto", status: "Próximamente", isReady: false },
            { id: 7, nombre: "Terreno Privado VIP", ubicacion: "Residencial Fase 2", area: "450", precio: "Por Definir", enganche: "Espéralo pronto", status: "Próximamente", isReady: false }
        ];

        function App() {
            const [selectedLote, setSelectedLote] = useState(null);

            const handleWhatsAppGeneral = () => {
                const mensaje = "Hola Andares Corporativo, me gustaría recibir asesoría sobre su catálogo de terrenos disponibles.";
                window.open(`https://wa.me/5212283146884?text=${encodeURIComponent(mensaje)}`, '_blank');
            };

            const handleVerDetalles = (terreno) => {
                if (terreno.isReady && terreno.linkDestino) {
                    window.open(terreno.linkDestino, '_blank');
                } else {
                    setSelectedLote(terreno);
                }
            };

            return (
                <div className="min-h-screen flex flex-col">
                    
                    {/* CABECERA CENTRADA PROFESIONAL */}
                    <header className="bg-white py-12 px-4 flex flex-col items-center justify-center border-b border-gray-200">
                        <img 
                            src="./logo.jpg" 
                            alt="Andares Corporativo" 
                            className="h-32 md:h-48 object-contain logo-blend mb-2"
                            onError={(e) => {
                                e.target.style.display = 'none';
                                e.target.nextSibling.style.display = 'block';
                            }}
                        />
                        <div style={{display: 'none'}} className="text-center mb-4">
                            <h1 className="font-serif italic text-5xl font-black text-brand-dark">Andares</h1>
                            <p className="text-sm font-bold tracking-[0.3em] mt-2 text-brand-dark">CORPORATIVO</p>
                        </div>
                        
                        <p className="text-brand-gold font-bold tracking-[0.4em] uppercase text-xs md:text-sm mt-4 italic">"Confianza que construye"</p>
                        
                        <button onClick={handleWhatsAppGeneral} className="mt-8 bg-brand-dark text-white px-8 py-4 rounded-full text-sm font-bold hover:bg-brand-gold transition-all shadow-xl flex items-center gap-2">
                            <i className="fa-brands fa-whatsapp text-green-400 text-xl"></i>
                            Hablar con un Asesor
                        </button>
                    </header>

                    {/* SECCIÓN HERO (PORTADA) */}
                    <section 
                        className="relative w-full h-[50vh] min-h-[400px] flex items-center justify-center overflow-hidden"
                        style={{
                            backgroundImage: "linear-gradient(to bottom, rgba(17,17,17,0.8), rgba(17,17,17,0.5)), url('./portada-monte-alto.jpg')",
                            backgroundSize: 'cover',
                            backgroundPosition: 'center'
                        }}
                    >
                        <div className="relative max-w-4xl mx-auto px-6 text-center z-10">
                            <h2 className="text-3xl md:text-6xl font-black text-white mb-6 tracking-tight leading-tight drop-shadow-2xl">
                                Invierte hoy en tu <span className="text-brand-gold italic">Futuro.</span>
                            </h2>
                            <p className="text-lg md:text-2xl text-gray-200 max-w-2xl mx-auto font-light drop-shadow-lg">
                                Desarrollos con certeza legal, alta plusvalía y los mejores planes de financiamiento en la zona.
                            </p>
                        </div>
                    </section>

                    {/* CATÁLOGO DE LOTES */}
                    <main className="flex-1 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-20 w-full">
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
                            {TERRENOS.map((terreno) => (
                                <div key={terreno.id} className="bg-white rounded-[2.5rem] overflow-hidden shadow-lg hover:shadow-2xl transition-all duration-500 border border-gray-100 flex flex-col group transform hover:-translate-y-2">
                                    
                                    <div className="absolute top-6 right-6 z-20">
                                        {terreno.isReady ? (
                                            <span className="bg-green-500 text-white px-5 py-2 rounded-full text-[10px] font-black uppercase tracking-widest shadow-lg flex items-center gap-2">
                                                <div className="w-2 h-2 bg-white rounded-full animate-pulse"></div> Disponible
                                            </span>
                                        ) : (
                                            <span className="bg-gray-800/90 backdrop-blur-md text-white px-5 py-2 rounded-full text-[10px] font-bold uppercase tracking-widest">
                                                Próximamente
                                            </span>
                                        )}
                                    </div>

                                    <div className="h-72 bg-gray-100 relative overflow-hidden">
                                        {terreno.isReady ? (
                                            <img 
                                                src={terreno.imagen} 
                                                alt={terreno.nombre} 
                                                className="w-full h-full object-cover transform group-hover:scale-110 transition-transform duration-1000"
                                                onError={(e) => { e.target.src = 'https://images.unsplash.com/photo-1500382017468-9049fed747ef?q=80&w=1000&auto=format&fit=crop'; }}
                                            />
                                        ) : (
                                            <div className="w-full h-full bg-brand-dark/10 flex flex-col items-center justify-center text-gray-400">
                                                <i className="fa-solid fa-map-location-dot text-7xl mb-4 opacity-30"></i>
                                            </div>
                                        )}
                                        <div className="absolute inset-0 bg-gradient-to-t from-black/70 via-transparent to-transparent"></div>
                                    </div>

                                    <div className="p-10 flex-1 flex flex-col bg-white">
                                        <h3 className="text-2xl font-black text-brand-dark mb-3 leading-tight uppercase tracking-tighter">{terreno.nombre}</h3>
                                        <p className="text-gray-500 text-sm mb-8 flex items-start gap-2">
                                            <i className="fa-solid fa-location-dot mt-1 text-brand-gold"></i> {terreno.ubicacion}
                                        </p>
                                        
                                        <div className="grid grid-cols-2 gap-4 mb-8">
                                            <div className="bg-gray-50 p-4 rounded-2xl border border-gray-100">
                                                <p className="text-[9px] text-gray-400 font-bold uppercase tracking-widest mb-1">Área</p>
                                                <p className="font-black text-brand-dark text-lg">{terreno.area} m²</p>
                                            </div>
                                            <div className="bg-gray-50 p-4 rounded-2xl border border-gray-100">
                                                <p className="text-[9px] text-gray-400 font-bold uppercase tracking-widest mb-1">Precio</p>
                                                <p className="font-black text-brand-dark text-lg">{terreno.precio}</p>
                                            </div>
                                        </div>

                                        <div className="bg-brand-gold/10 text-brand-dark px-5 py-4 rounded-2xl text-[11px] font-bold mb-10 border border-brand-gold/20 flex items-center gap-3">
                                            <i className="fa-solid fa-shield-check text-brand-gold text-lg"></i> {terreno.enganche}
                                        </div>

                                        <div className="mt-auto">
                                            <button 
                                                onClick={() => handleVerDetalles(terreno)} 
                                                className={`w-full py-5 rounded-2xl text-xs font-black uppercase tracking-[0.2em] transition-all ${
                                                    terreno.isReady 
                                                    ? 'bg-brand-dark text-white hover:bg-brand-gold shadow-xl hover:shadow-brand-gold/40' 
                                                    : 'bg-gray-100 text-gray-400 cursor-not-allowed'
                                                }`}
                                            >
                                                {terreno.isReady ? 'Ver Proyecto Completo' : 'Próximamente'}
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </main>

                    {/* FOOTER CHINGÓN */}
                    <footer className="bg-brand-dark text-gray-400 py-20 text-center border-t border-gray-800 mt-auto">
                        <p className="font-serif italic text-4xl font-black text-white mb-3">Andares</p>
                        <p className="font-bold text-brand-gold tracking-[0.4em] uppercase mb-10 text-xs">Corporativo</p>
                        
                        <div className="flex justify-center gap-6 mb-12">
                            <a href="#" className="w-14 h-14 rounded-full bg-gray-900 flex items-center justify-center hover:bg-brand-gold hover:text-brand-dark transition-all transform hover:scale-110 shadow-lg"><i className="fa-brands fa-facebook-f text-xl"></i></a>
                            <a href="#" className="w-14 h-14 rounded-full bg-gray-900 flex items-center justify-center hover:bg-brand-gold hover:text-brand-dark transition-all transform hover:scale-110 shadow-lg"><i className="fa-brands fa-instagram text-xl"></i></a>
                            <a href="#" className="w-14 h-14 rounded-full bg-gray-900 flex items-center justify-center hover:bg-brand-gold hover:text-brand-dark transition-all transform hover:scale-110 shadow-lg"><i className="fa-brands fa-whatsapp text-xl"></i></a>
                        </div>
                        <p className="text-[10px] opacity-40 tracking-[0.3em] uppercase">&copy; 2026 ANDARES CORPORATIVO.</p>
                    </footer>

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
